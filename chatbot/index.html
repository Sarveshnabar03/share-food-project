<!DOCTYPE html>
<html>
<head>
  <title>NGO Chatbot</title>
  <style>
    /* Reset and base */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f7f9fc;
      color: #333;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 15px 40px;
      min-height: 100vh;
      background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
      user-select: none;
    }

    h1 {
      margin-bottom: 25px;
      font-size: 2.5rem;
      color: #1e3c72;
      text-shadow: 1px 1px 5px rgba(0,0,0,0.1);
      user-select: text;
    }

    /* Chatbox styling */
    #chatbox {
      width: 100%;
      max-width: 600px;
      height: 450px;
      background-color: white;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
      padding: 20px 25px;
      overflow-y: auto;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
      border: 2px solid transparent;
      transition: border-color 0.3s ease;
    }
    #chatbox:focus-within {
      border-color: #4a90e2;
      outline: none;
    }

    /* Messages */
    #chatbox p {
      padding: 12px 18px;
      border-radius: 25px;
      max-width: 75%;
      line-height: 1.5;
      font-size: 1.05rem;
      word-wrap: break-word;
      box-shadow: 0 3px 7px rgba(0,0,0,0.05);
      opacity: 0;
      animation: fadeIn 0.4s forwards;
    }

    /* User message */
    #chatbox p.user {
      background-color: #4a90e2;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 6px;
      box-shadow: 0 4px 15px rgba(74, 144, 226, 0.5);
      font-weight: 600;
    }

    /* Bot message */
    #chatbox p.bot {
      background-color: #e1e1e1;
      color: #333;
      align-self: flex-start;
      border-bottom-left-radius: 6px;
      font-style: italic;
    }

    /* Input and button container */
    .input-container {
      display: flex;
      justify-content: center;
      width: 100%;
      max-width: 600px;
    }

    input#userInput {
      flex-grow: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 30px;
      box-shadow: 0 3px 15px rgba(0,0,0,0.1);
      font-size: 1.2rem;
      outline: none;
      transition: box-shadow 0.3s ease, transform 0.2s ease;
    }
    input#userInput:focus {
      box-shadow: 0 0 15px #4a90e2;
      transform: scale(1.02);
    }

    button {
      padding: 14px 28px;
      margin-left: 12px;
      background: linear-gradient(135deg, #4a90e2, #357ABD);
      border: none;
      border-radius: 30px;
      color: white;
      font-weight: 700;
      font-size: 1.15rem;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(53, 122, 189, 0.6);
      transition: background-color 0.3s ease, box-shadow 0.3s ease, transform 0.15s ease;
      user-select: none;
    }
    button:hover {
      background: linear-gradient(135deg, #357ABD, #2A5C91);
      box-shadow: 0 7px 25px rgba(41, 89, 137, 0.7);
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(0);
      box-shadow: 0 3px 15px rgba(41, 89, 137, 0.5);
    }

    /* Scrollbar styling for chatbox */
    #chatbox::-webkit-scrollbar {
      width: 8px;
    }
    #chatbox::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 4px;
    }
    #chatbox::-webkit-scrollbar-thumb {
      background: #4a90e2;
      border-radius: 4px;
    }
    #chatbox::-webkit-scrollbar-thumb:hover {
      background: #357ABD;
    }

    /* Responsive */
    @media (max-width: 600px) {
      #chatbox {
        height: 350px;
      }
      input#userInput {
        font-size: 1rem;
        padding: 12px 16px;
      }
      button {
        font-size: 1rem;
        padding: 12px 20px;
        margin-left: 8px;
      }
    }

    /* Fade-in animation for messages */
    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <h1>Ask the NGO Chatbot</h1>
  <div id="chatbox" tabindex="0"></div>
  <div class="input-container">
    <input type="text" id="userInput" placeholder="Ask something..." autocomplete="off" />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
